spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:doctor_platform_${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=0
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

platform:
  jwt:
    secret: doctor-platform-jwt-secret-please-change
    expire-minutes: 240
  ai:
    provider: simulated
    model-name: simulated-outpatient-ai
    api-key: replace-me
    base-url: https://api.example.com
    enabled: true
