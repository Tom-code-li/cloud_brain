server:
  port: 9000

doctor:
  jwt:
    secret: ${DOCTOR_JWT_SECRET:01234567890123456789012345678901}
    ttl-seconds: ${DOCTOR_JWT_TTL_SECONDS:3600}

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - '*'
            allow-credentials: true
      routes:
        - id: auth
          uri: http://localhost:9100
          predicates:
            - Path=/auth/**
        - id: registration
          uri: http://localhost:9200
          predicates:
            - Path=/registration/**
        - id: outpatient
          uri: http://localhost:9300
          predicates:
            - Path=/outpatient/**
        - id: medical-exam
          uri: http://localhost:9400
          predicates:
            - Path=/medical-exam/**
        - id: pharmacy
          uri: http://localhost:9500
          predicates:
            - Path=/pharmacy/**
        - id: ai
          uri: http://localhost:9600
          predicates:
            - Path=/ai/**
