server:
  port: 9400

spring:
  application:
    name: medical-exam-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MEDICAL_EXAM_DB_URL:jdbc:mysql://localhost:3306/doctor_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MEDICAL_EXAM_DB_USERNAME:root}
    password: ${MEDICAL_EXAM_DB_PASSWORD:}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  provider: ${AI_PROVIDER:simulated}
  ant-ling:
    api-key: ${ANT_LING_API_KEY:}
    base-url: ${ANT_LING_BASE_URL:https://api.ant-ling.com/v1/}
    model: ${ANT_LING_MODEL:Ling-2.6-flash}
    timeout-seconds: ${ANT_LING_TIMEOUT_SECONDS:30}
